<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN Login</title>

<style>
body {
  font-family: Arial;
  background:#eef2f3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
}

button {
  background:#27ae60;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="container">
<h2>ZEN-DNA Login</h2>

<input id="id" placeholder="Enter ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY = "ZEN_DNA_2026";

function login() {

  let id = document.getElementById("id").value;
  let pass = document.getElementById("pass").value;

  fetch(`${API}?action=login&id=${id}&password=${pass}&key=${KEY}`)
  .then(res => res.json())
  .then(res => {

    if (res.status === "success") {

      localStorage.setItem("user", JSON.stringify(res));
      window.location = "scanner.html";

    } else if (res.status === "not_approved") {
      msg.innerText = "Not Approved";
    } else {
      msg.innerText = "Invalid Login";
    }

  });
}
</script>

</body>
</html>
