<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZEN DNA Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #2c5364;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #203a43;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>ZEN DNA</h2>
    <input type="text" id="id" placeholder="Enter ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
async function login() {

  const id = document.getElementById("id").value.trim();
  const password = document.getElementById("password").value.trim();

  const url = `https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec?id=${id}&password=${password}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));
      window.location.href = "scanner.html";
    }
    else if (data.status === "not_approved") {
      alert("Access not approved");
    }
    else {
      alert("Invalid ID or Password");
    }

  } catch (err) {
    alert("Server error");
    console.error(err);
  }
}
</script>

</body>
</html>
