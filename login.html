<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEN - DNA Login</title>

<style>
  :root {
    --primary: #1e3a8a;
    --secondary: #065f46;
    --text-main: #1f2937;
    --bg-overlay: rgba(0, 0, 0, 0.7);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    /* BACKGROUND IMAGE APPLIED HERE */
    background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 15px;
  }

  .container {
    background: rgba(255, 255, 255, 0.98);
    padding: 25px;
    border-radius: 16px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    border-top: 4px solid var(--primary);
  }

  .motto {
    font-size: 10px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: 1.5px;
    margin-bottom: 15px;
    text-transform: uppercase;
  }

  .logo-section {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 15px;
  }

  .logo-section img {
    height: 60px;
    width: auto;
    /* REMOVES LOGO BACKGROUND FRINGE */
    mix-blend-mode: multiply;
    display: block;
  }

  .college-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 12px;
    line-height: 1.4;
    text-transform: uppercase;
  }

  h2 { color: var(--primary); margin: 10px 0 4px; font-size: 17px; border-top: 1px solid #eee; padding-top: 12px; letter-spacing: 0.5px; }
  h4 { color: var(--secondary); margin: 0 0 15px; font-weight: 700; font-size: 10.5px; line-height: 1.4; }

  .input-group { position: relative; margin-top: 10px; text-align: left; }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    background: #fff;
  }

  input:focus { border-color: var(--primary); }

  .show-pass {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 9px;
    color: var(--primary);
    font-weight: 800;
    background: #f0f0f0;
    padding: 4px 6px;
    border-radius: 4px;
    user-select: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: 0.2s;
  }

  button:active { transform: scale(0.98); }

  /* SPINNER ANIMATION */
  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  #msg { margin-top: 12px; font-weight: 600; color: #dc2626; font-size: 11px; min-height: 15px; line-height: 1.3; }

  footer {
    margin-top: 20px;
    font-size: 10px;
    color: #666;
    border-top: 1px solid #f0f0f0;
    padding-top: 12px;
    font-weight: 600;
  }
</style>
</head>

<body>

<div class="container">
  <div class="motto">"Let Your Light Shine"</div>

  <div class="logo-section">
    <a href="https://www.loyolacollege.edu" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/en/1/13/Loyola_College_Chennai_-_Coat_of_arms.png" alt="Loyola">
    </a>
    <a href="https://azbtweb.wixsite.com/zen-dna" target="_blank">
      <img src="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png" alt="ZEN DNA">
    </a>
  </div>

  <div class="college-name">
    PG & Research Department of Advanced Zoology and Biotechnology,<br>
    Loyola College (Autonomous), Chennai - 34.
  </div>

  <h2>MUSEUM DATABASE</h2>
  <h4>ZOOLOGY - E-LEARNING NETWORK,<br>DEPARTMENT NURTURING ACADEMICS.</h4>

  <div class="input-group">
    <input id="id" placeholder="User ID" autocomplete="username">
  </div>

  <div class="input-group">
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
    <span class="show-pass" onclick="togglePass()">SHOW</span>
  </div>

  <button id="loginBtn" onclick="login()">
    <span id="btnText">LOGIN</span>
    <div class="spinner" id="loader"></div>
  </button>

  <p id="msg"></p>

  <footer>&copy; 2026 ZEN - DNA. All rights reserved. </footer>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY = "ZEN_DNA_2026";

function togglePass() {
  const passInput = document.getElementById("pass");
  const btn = document.querySelector(".show-pass");
  if (passInput.type === "password") {
    passInput.type = "text";
    btn.innerText = "HIDE";
  } else {
    passInput.type = "password";
    btn.innerText = "SHOW";
  }
}

function login() {
  const id = document.getElementById("id").value;
  const pass = document.getElementById("pass").value;
  const msg = document.getElementById("msg");
  const loader = document.getElementById("loader");
  const btnText = document.getElementById("btnText");

  if(!id || !pass) {
    msg.innerText = "Error: ID and Password required";
    return;
  }

  // Loading State UI
  loader.style.display = "block";
  btnText.style.opacity = "0.6";
  msg.innerText = "";

  fetch(`${API}?action=login&id=${id}&password=${pass}&key=${KEY}`)
  .then(res => res.json())
  .then(res => {
    loader.style.display = "none";
    btnText.style.opacity = "1";

    if (res.status === "success") {
      localStorage.setItem("user", JSON.stringify(res));
      window.location = "scanner.html";
    } else if (res.status === "not_approved") {
      msg.innerText = "Access Denied: Pending Approval, Contact admin: zendna1994@gmail.com";
    } else {
      msg.innerText = "Invalid Login, Contact admin: zendna1994@gmail.com";
    }
  })
  .catch(err => {
    loader.style.display = "none";
    btnText.style.opacity = "1";
    msg.innerText = "Server Error. Please try again.";
  });
}
</script>

</body>
</html>
