<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEN DNA | Admin Control Tower</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@400;600;800&family=Lora:ital,wght@1,600&display=swap');

        :root { --primary: #1e3a8a; --accent: #3b82f6; --glass: rgba(255, 255, 255, 0.98); --danger: #ef4444; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)),
            url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg');
            background-size: cover; background-attachment: fixed; color: #1e293b;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .title h1 { margin: 0; font-family: 'Lora'; font-style: italic; font-size: 18px; color: white; text-transform: uppercase; }
        .nav-wrap { display: flex; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; font-weight: 800; text-decoration: none; }

        .container { background: var(--glass); margin: 15px; border-radius: 24px; padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); min-height: 85vh; }

        /* TABS */
        .tab-row { display: flex; gap: 25px; border-bottom: 1px solid #e2e8f0; margin-bottom: 20px; overflow-x: auto; }
        .tab-link { padding: 12px 5px; cursor: pointer; font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-link.active { color: var(--primary); border-color: var(--primary); }

        /* SEARCH BAR - CONSISTENT FOR EVERY TAB */
        .control-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; position: sticky; top: 70px; z-index: 500; background: var(--glass); padding: 10px 0; }
        .search-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 13px; outline: none; background: white; }

        /* TABLES */
        .table-wrap { overflow-x: auto; border-radius: 15px; border: 1px solid #e2e8f0; background: white; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f1f5f9; padding: 15px; text-align: left; color: var(--primary); font-size: 10px; font-weight: 900; text-transform: uppercase; position: sticky; top: 0; z-index: 10; cursor: pointer; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }

        /* NEW SPECIMEN FORM */
        .specimen-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; background: #f8fafc; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 11px; font-weight: 900; color: #475569; text-transform: uppercase; }

        .btn-save { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; }

        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-weight:900; font-size:10px; color:var(--primary); margin-top:15px;">SYNCING SECURE DATABASE...</p></div>

<div class="header">
    <div class="title">
        <h1>MUSEUM DATABASE</h1>
        <p style="margin:0; font-size:9px; color:#38bdf8; letter-spacing:2px;">COMMAND CENTER | LOYOLA</p>
    </div>
    <div class="nav-wrap">
        <a href="qr-generator.html" class="nav-btn">QR Generator</a>
        <button class="nav-btn" onclick="openProfile()">Profile</button>
        <button class="nav-btn" style="background:var(--danger)" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <div class="tab-row">
        <div class="tab-link active" onclick="switchMainTab(this, 'dashSect')">Dashboard</div>
        <div class="tab-link" onclick="switchMainTab(this, 'userSect')">Student Management</div>
        <div class="tab-link" onclick="switchMainTab(this, 'specSect')">Specimen Database</div>
        <div class="tab-link" onclick="switchMainTab(this, 'logSect')">Activity Logs</div>
    </div>

    <div id="dashSect" class="section">
        <div style="background:#fff; border:1px solid #e2e8f0; padding:20px; border-radius:20px;"><canvas id="mainChart" height="100"></canvas></div>
    </div>

    <div id="userSect" class="section" style="display:none;">
        <div class="tab-row">
            <div class="tab-link active" onclick="switchSubTab(this, 'uTx')">Transactions</div>
            <div class="tab-link" onclick="switchSubTab(this, 'uReport')">Reports</div>
        </div>
        <div class="control-bar"><input type="text" class="search-input" placeholder="Search Students by ID, Name, or Status..." oninput="filterTable(this.value)"></div>
        <div id="uTx" class="sub-view"><div class="table-wrap"><table><thead id="hTx"></thead><tbody id="bTx"></tbody></table></div></div>
        <div id="uReport" class="sub-view" style="display:none;"><div class="table-wrap"><table><thead id="hReport"></thead><tbody id="bReport"></tbody></table></div></div>
    </div>

    <div id="specSect" class="section" style="display:none;">
        <div class="tab-row">
            <div class="tab-link active" onclick="switchSubTab(this, 'sAdd')">New Specimen Entry</div>
            <div class="tab-link" onclick="switchSubTab(this, 'sFull')">Inventory List</div>
        </div>
        
        <div id="sAdd">
            <div class="specimen-form" id="newSpecForm">
                <div class="form-group"><label>Unique ID</label><input data-key="id" class="search-input" placeholder="e.g., T-V-P09-C06-001"></div>
                <div class="form-group"><label>Scientific Name</label><input data-key="sci" class="search-input" placeholder="e.g., Psittacula krameri"></div>
                <div class="form-group"><label>Common Name</label><input data-key="com" class="search-input" placeholder="e.g., Parrot"></div>
                <div class="form-group"><label>Phylum</label><input data-key="phy" class="search-input" placeholder="e.g., Chordata"></div>
                <div class="form-group"><label>Class</label><input data-key="cla" class="search-input" placeholder="e.g., Aves"></div>
                <div class="form-group"><label>Image Drive Link</label><input data-key="img" class="search-input" placeholder="https://drive.google.com/..."></div>
                <div class="form-group"><label>PDF Drive Link</label><input data-key="pdf" class="search-input" placeholder="https://drive.google.com/..."></div>
                <div class="form-group"><label>Video Link</label><input data-key="vid" class="search-input" placeholder="URL"></div>
                <div class="form-group"><label>Access Level</label>
                    <select data-key="acc" class="search-input">
                        <option value="0">0 (Public Access)</option>
                        <option value="1">1 (Staff Access)</option>
                        <option value="2">2 (Admin Only)</option>
                    </select>
                </div>
            </div>
            <button class="btn-save" onclick="saveNewSpecimen()">Sync New Specimen to Sheet</button>
        </div>

        <div id="sFull" class="sub-view" style="display:none;">
            <div class="control-bar"><input type="text" class="search-input" placeholder="Search Inventory by Name, ID, or Phylum..." oninput="filterTable(this.value)"></div>
            <div class="table-wrap"><table><thead id="hSpec"></thead><tbody id="bSpec"></tbody></table></div>
        </div>
    </div>

    <div id="logSect" class="section" style="display:none;">
        <div class="control-bar">
            <input type="date" id="lDate" class="search-input" onchange="fetchData(true)">
            <input type="text" class="search-input" placeholder="Search Logs by Student ID..." oninput="filterTable(this.value)">
        </div>
        <div class="table-wrap"><table><thead id="hLog"></thead><tbody id="bLog"></tbody></table></div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Lora'; margin-bottom:20px;">EDIT RECORD</h2>
        <div id="editFields" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
        <button class="btn-save" id="modalSaveBtn">Update Sheet</button>
        <button class="btn-save" onclick="closeModal()" style="background:#334155;">Cancel</button>
    </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";
const user=JSON.parse(localStorage.getItem("user"));
if(!user || user.role < 2) location.href="login.html";

let allData = {};

function switchMainTab(btn, id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    btn.classList.add('active');
}

function switchSubTab(btn, id) {
    const p = btn.closest('.section');
    p.querySelectorAll('.sub-view, #sAdd').forEach(v => v.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    p.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    btn.classList.add('active');
}

function filterTable(q) {
    const query = q.toLowerCase();
    // Targets the currently visible table body rows
    const visibleSection = document.querySelector('.section[style*="block"]') || document.querySelector('.section:not([style*="none"])');
    const rows = visibleSection.querySelectorAll('tbody tr');
    rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(query) ? "" : "none");
}

async function fetchData(silent = false) {
    if(!silent) document.getElementById('loader').style.display = 'flex';
    const r = await fetch(`${API}?action=fullData&key=${KEY}`);
    allData = await r.json();

    renderTable('hTx', 'bTx', allData.allUsers.filter((r,i) => i==0 || !r[13] || r[13].toUpperCase()=="REJECTED"), true);
    renderTable('hReport', 'bReport', allData.allUsers.filter((r,i) => i==0 || r[13]), true);
    renderTable('hSpec', 'bSpec', allData.allSpecimens, false);
    renderTable('hLog', 'bLog', allData.allLogs, false, false);

    initChart(allData.allLogs);
    document.getElementById('loader').style.display = 'none';
}

function renderTable(hId, bId, data, isUser, showBtn = true) {
    const header = data[0].map(h => `<th>${h}</th>`).join('');
    document.getElementById(hId).innerHTML = `<tr>${header}${showBtn?'<th>Actions</th>':''}</tr>`;
    
    let html = "";
    for(let i=1; i<data.length; i++) {
        let cells = data[i].map(c => `<td>${c}</td>`).join('');
        let btns = showBtn ? `<td><button class="action-btn" onclick="openEditModal('${isUser?'user':'spec'}', '${data[i][isUser?2:0]}')">EDIT</button></td>` : '';
        html += `<tr>${cells}${btns}</tr>`;
    }
    document.getElementById(bId).innerHTML = html;
}

function openEditModal(type, id) {
    const record = type === 'user' ? allData.allUsers.find(u => u[2] == id) : allData.allSpecimens.find(s => s[0] == id);
    const headers = type === 'user' ? allData.allUsers[0] : allData.allSpecimens[0];
    let fieldsHtml = "";
    headers.forEach((h, i) => {
        fieldsHtml += `<div class="form-group"><label>${h}</label><input class="search-input modal-input" data-idx="${i}" value="${record[i] || ''}"></div>`;
    });
    document.getElementById('editFields').innerHTML = fieldsHtml;
    document.getElementById('modalSaveBtn').onclick = () => saveEdit(type, id);
    document.getElementById('editModal').style.display = 'flex';
}

async function saveEdit(type, originalId) {
    const inputs = document.querySelectorAll('.modal-input');
    const updatedData = Array.from(inputs).map(i => i.value);
    document.getElementById('loader').style.display = 'flex';
    const payload = { action: type === 'user' ? "updateUserFull" : "updateSpecFull", id: originalId, rowData: updatedData, key: KEY };
    await fetch(API, { method:'POST', body:JSON.stringify(payload) });
    closeModal(); fetchData(true);
}

function closeModal() { document.getElementById('editModal').style.display = 'none'; }

async function saveNewSpecimen() {
    const inputs = document.querySelectorAll('#newSpecForm input, #newSpecForm select');
    const d = { action: "addSpecimen", key: KEY };
    inputs.forEach(i => d[i.dataset.key] = i.value);
    document.getElementById('loader').style.display = 'flex';
    await fetch(API, { method:'POST', body:JSON.stringify(d) });
    alert("Specimen Added Successfully");
    fetchData();
}

function initChart(logs) {
    const counts = {};
    logs.slice(1).forEach(r => { const d = new Date(r[0]).toLocaleDateString(); counts[d] = (counts[d] || 0) + 1; });
    const sortedDates = Object.keys(counts).sort((a,b) => new Date(a) - new Date(b));
    new Chart(document.getElementById('mainChart'), { type: 'line', data: { labels: sortedDates, datasets: [{ label: 'Daily Scans', data: sortedDates.map(d => counts[d]), borderColor: '#1e3a8a', tension: 0.3, fill: true, backgroundColor: 'rgba(30, 58, 138, 0.05)' }] } });
}

function logout() { localStorage.clear(); location.href="login.html"; }

fetchData();
</script>
</body>
</html>
