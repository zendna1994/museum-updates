<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN - DNA | Label Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @page { size: A4; margin: 8mm; }
        body { margin: 0; background: #e0e0e0; -webkit-print-color-adjust: exact; font-family: 'Poppins', sans-serif; }

        /* GRID: Responsive for screen, fixed for print */
        .page-container {
            width: 100%;
            max-width: 210mm;
            background: white;
            margin: auto;
            display: grid;
            /* On mobile, it will show 1 column. On desktop, it shows 3. */
            grid-template-columns: repeat(auto-fit, 66mm);
            grid-auto-rows: 25mm;
            gap: 2mm;
            padding: 5mm;
            justify-content: center;
        }

        /* LABEL DESIGN - EXACTLY AS PROVIDED */
        .label {
            width: 66mm;
            height: 25mm;
            border: 0.2mm solid #333;
            border-radius: 4mm;
            display: flex;
            overflow: hidden;
            background: #fff;
            position: relative;
            box-sizing: border-box; /* Ensures border doesn't add to width */
        }

        /* WATERMARK */
        .label::after {
            content: "ZEN-DNA, LC";
            position: absolute;
            bottom: 2mm;
            right: 2mm;
            font-size: 5pt;
            color: rgba(0,0,0,0.1);
        }

        /* QR SECTION */
        .qr-section {
            width: 24mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 0.1mm solid #eee;
        }

        .qr-wrapper {
            width: 15mm;
            height: 15mm;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ensure QR code fills the wrapper properly */
        .qr-wrapper img:not(.qr-logo), .qr-wrapper canvas {
            width: 15mm !important;
            height: 15mm !important;
        }

        /* Logo centered on QR */
        .qr-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3.5mm;
            height: 3.5mm;
            background: white;
            padding: 1px;
            z-index: 10;
        }

        .uid-text {
            font-family: monospace;
            font-size: 6pt;
            font-weight: bold;
            margin-top: 1.5mm;
            white-space: nowrap;
            text-align: center;
        }

        /* TEXT SECTION */
        .text-section {
            flex-grow: 1;
            padding: 0 4mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .scientific-name {
            font-family: "Times New Roman", serif;
            font-style: italic;
            font-weight: bold;
            font-size: 9pt;
            line-height: 1.1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .divider {
            width: 15mm;
            height: 0.2mm;
            background: #000;
            margin: 1mm 0;
        }

        .common-name {
            font-family: Georgia, serif;
            font-size: 7.5pt;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* UI ELEMENTS */
        .no-print {
            background: linear-gradient(90deg,#27ae60,#2ecc71);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 0 0 10px 10px;
        }
        .no-print h3 { margin: 0 0 10px; font-size: 1.5rem; }
        .no-print button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background: #1a2a22;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            /* Force 3 columns for A4 paper regardless of screen size */
            .page-container { 
                display: grid; 
                grid-template-columns: repeat(3, 66mm); 
                padding: 5mm;
                width: 210mm;
            }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h3>ZEN - DNA | Museum Update - Label Generator</h3>
    <button onclick="window.print()">Print Labels</button>
</div>

<div class="page-container" id="grid"></div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRTzNxCuuF8I0h64nf5YHfMANlBx08JfjHuSF4TUguLaamNPihaL9s-FaUcIwphKt5ilUMyLr525a8/pub?gid=357903049&single=true&output=csv";
    const logoUrl = "https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png";
    let previousData = [];

    function generateLabels(data) {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        data.forEach((row, i) => {
            if (!row.Unique_ID) return;

            const div = document.createElement("div");
            div.className = "label";
            const qrId = "qr-" + i;

            div.innerHTML = `
            <div class="qr-section">
                <div id="${qrId}" class="qr-wrapper"></div>
                <div class="uid-text">${row.Unique_ID}</div>
            </div>
            <div class="text-section">
                <div class="scientific-name">${row.Scientific_Name || ""}</div>
                <div class="divider"></div>
                <div class="common-name">${row.Common_Name || ""}</div>
            </div>`;
            
            grid.appendChild(div);

            // Generate QR Code
            new QRCode(document.getElementById(qrId), {
                text: row.Unique_ID,
                width: 150,
                height: 150,
                correctLevel: QRCode.CorrectLevel.H
            });

            // FIX: Re-insert logo after QR is rendered
            setTimeout(() => {
                const wrapper = document.getElementById(qrId);
                const img = document.createElement("img");
                img.src = logoUrl;
                img.className = "qr-logo";
                wrapper.appendChild(img);
            }, 50);
        });
    }

    function fetchData() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const newData = results.data;
                if(JSON.stringify(newData) !== JSON.stringify(previousData)) {
                    previousData = newData;
                    generateLabels(newData);
                }
            }
        });
    }

    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
