<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZEN DNA Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

header {
    background: #2c5364;
    padding: 15px;
    font-size: 20px;
}

#reader {
    width: 300px;
    margin: 30px auto;
}

.result-box {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 10px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: red;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>
<body>

<header>ZEN DNA Scanner</header>

<div id="reader"></div>

<div class="result-box" id="result">Scan a QR Code</div>

<button onclick="logout()">Logout</button>

<script>

// 🔐 CHECK LOGIN
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "login.html";
}

// 📷 QR SCANNER
function onScanSuccess(decodedText) {
    document.getElementById("result").innerHTML =
        "<b>Scanned Code:</b><br>" + decodedText;
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
);

// 🔓 LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

</script>

</body>
</html>
