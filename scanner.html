<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { font-family: Arial, sans-serif; background:#eef2f3; text-align:center; padding: 10px; margin: 0; }
  .container { background:white; padding:20px; border-radius:15px; max-width:400px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  
  #result { display:none; margin-top:20px; border-top: 2px solid #eee; padding-top: 15px; }
  #tree { font-family: 'Courier New', monospace; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; color: #333; }
  
  #adminPanel { background:#fff; padding:15px; margin-top:20px; border-radius: 10px; border: 2px solid #3498db; text-align: left; }
  #adminPanel h3 { margin-top: 0; color: #2c3e50; }
  
  #historyBox { margin-top:20px; text-align: left; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
  #historyList { padding-left: 20px; color: #555; }

  img { width:100%; border-radius:10px; margin-bottom: 10px; }
  button, input { width:100%; padding:12px; margin-top:10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
  button { background: #3498db; color: white; border: none; cursor: pointer; transition: 0.3s; }
  button:hover { background: #2980b9; }

  #profile { display:none; position:fixed; top:20%; left:5%; right:5%; background:white; padding:25px; border-radius:15px; box-shadow: 0 0 30px rgba(0,0,0,0.4); z-index: 2000; }
</style>
</head>
<body>

<div class="container">
  <h3>ZEN DNA Scanner</h3>
  
  <button onclick="startScanner()">📷 Scan QR Code</button>
  <div id="reader" style="width: 100%; margin-top: 10px;"></div>

  <input id="manual" placeholder="Enter Specimen ID">
  <button onclick="manualSearch()">🔍 Search ID</button>
  <button onclick="showProfile()" style="background:#7f8c8d;">👤 My Profile</button>

  <div id="adminPanel" style="display:none;">
    <h3>Admin Dashboard</h3>
    <p>Total Users: <b id="a_users">...</b></p>
    <p>Total Specimens: <b id="a_specimens">...</b></p>
    <p>Total Scans: <b id="a_logs">...</b></p>
    <button onclick="loadAdmin()" style="background:#2ecc71;">Refresh Stats</button>
  </div>

  <div id="result">
    <img id="img">
    <h3 id="sci" style="margin: 5px 0;"></h3>
    <p id="com" style="color: #666; font-style: italic;"></p>
    <p><b>ID:</b> <span id="uid"></span></p>
    
    <div id="tree" style="text-align:left; margin-top:15px;"></div>

    <iframe id="pdf" width="100%" height="300" style="margin-top:15px; border-radius: 8px; border: 1px solid #ddd;"></iframe>
  </div>

  <div id="historyBox">
    <h4>Recent Scans</h4>
    <ul id="historyList"></ul>
  </div>
</div>

<div id="profile">
  <h3>User Profile</h3>
  <p id="pname"></p>
  <p id="pid"></p>
  <p id="prole"></p>
  <p id="pemail"></p>
  <button onclick="logout()" style="background:#e74c3c;">Logout</button>
  <button onclick="closeProfile()" style="background:#95a5a6; margin-top: 10px;">Close</button>
</div>

<script>
// UPDATED API URL
const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY = "ZEN_DNA_2026";

let user = JSON.parse(localStorage.getItem("user"));
if (!user) { window.location = "login.html"; }

// AUTO LOAD ADMIN IF ROLE IS 2 (Admin/HOD)
if (user.role == 2) {
  document.getElementById("adminPanel").style.display = "block";
  loadAdmin();
}

function search(id) {
  fetch(`${API}?action=scan&id=${id}&role=${user.role}&userId=${user.id}&key=${KEY}`)
  .then(res => res.json())
  .then(res => {
    if (res.status !== "success") { 
      alert(res.status === "restricted" ? "Access Denied: Level Too High" : "Specimen Not Found"); 
      return; 
    }

    let s = res.data;
    document.getElementById("result").style.display = "block";
    document.getElementById("uid").innerText = s.Unique_ID;
    document.getElementById("sci").innerText = s.Scientific_Name;
    document.getElementById("com").innerText = s.Common_Name;
    
    // Format Media
    document.getElementById("img").src = "https://drive.google.com/thumbnail?id=" + s.Image.split("/d/")[1].split("/")[0];
    document.getElementById("pdf").src = "https://drive.google.com/file/d/" + s.Pdf.split("/d/")[1].split("/")[0] + "/preview";

    // CLASSIFICATION TREE
    document.getElementById("tree").innerHTML = `
      <b>Classification</b><br>
      └── Phylum: ${s.Phylum}<br>
      &nbsp;&nbsp;&nbsp;&nbsp;└── Class: ${s.Class}
    `;

    saveHistory(s.Unique_ID);
  });
}

function loadAdmin() {
  fetch(`${API}?action=adminData&key=${KEY}`)
    .then(res => res.json())
    .then(res => {
      if (res.status !== "success") return;
      document.getElementById("a_users").innerText = res.users;
      document.getElementById("a_specimens").innerText = res.specimens;
      document.getElementById("a_logs").innerText = res.logs;
    });
}

function saveHistory(id) {
  let h = JSON.parse(localStorage.getItem("history")) || [];
  if(!h.includes(id)) { 
    h.unshift(id); 
    h = h.slice(0,5); 
    localStorage.setItem("history", JSON.stringify(h));
    loadHistory();
  }
}

function loadHistory() {
  let h = JSON.parse(localStorage.getItem("history")) || [];
  let list = document.getElementById("historyList");
  list.innerHTML = h.map(item => `<li>${item}</li>`).join("");
}

// SCANNER & PROFILE HELPERS
function startScanner() {
  let scanner = new Html5Qrcode("reader");
  scanner.start({ facingMode: "environment" }, { fps:10 }, txt => { 
    scanner.stop(); 
    search(txt); 
  }).catch(err => alert("Camera Error: " + err));
}

function manualSearch() { 
  let val = document.getElementById("manual").value;
  if(val) search(val);
}

function showProfile() { 
  document.getElementById("profile").style.display = "block";
  document.getElementById("pname").innerText = "Name: " + user.name;
  document.getElementById("pid").innerText = "ID: " + user.id;
  document.getElementById("prole").innerText = "Role Level: " + user.role;
  document.getElementById("pemail").innerText = "Email: " + user.email;
}

function closeProfile() { document.getElementById("profile").style.display = "none"; }
function logout() { localStorage.clear(); window.location = "login.html"; }

// Run on Start
loadHistory();
</script>
</body>
</html>
