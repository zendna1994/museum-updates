<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN DNA System</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#eef2f3; margin:0; }

.container {
  max-width:900px;
  margin:auto;
  padding:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:white;
}

.tab { display:none; }

.active { display:block; }

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #ddd;
  padding:8px;
  font-size:12px;
}

#profile {
  display:none;
  position:fixed;
  top:10%;
  left:5%;
  right:5%;
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>ZEN DNA SYSTEM</h2>

<button onclick="showProfile()">👤 Profile</button>

<!-- ADMIN TABS -->
<div id="adminTabs" style="display:none;">
  <button onclick="openTab('dashboard')">📊 Dashboard</button>
  <button onclick="openTab('database')">🧬 Database</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">

<div class="card">
<h3>Statistics</h3>
<p>Total Users: <span id="u"></span></p>
<p>Total Specimens: <span id="s"></span></p>
<p>Total Scans: <span id="l"></span></p>

<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Users</h3>
<table id="userTable"></table>
</div>

<div class="card">
<h3>Specimens</h3>
<table id="specimenTable"></table>
</div>

<div class="card">
<h3>Scan Logs</h3>
<table id="logTable"></table>
</div>

</div>

<!-- DATABASE (SCANNER) -->
<div id="database" class="tab">

<div class="card">

<button onclick="startScanner()">Scan</button>
<div id="reader"></div>

<input id="manual" placeholder="Enter ID">
<button onclick="manualSearch()">Search</button>

<div id="result" style="display:none;">
<img id="img" style="width:100%">
<h3 id="sci"></h3>
<p id="com"></p>
<p id="uid"></p>

<div id="tree"></div>

<iframe id="pdf" width="100%" height="300"></iframe>
</div>

</div>

</div>

</div>

<!-- PROFILE -->
<div id="profile">
<h3>User Profile</h3>
<p id="pname"></p>
<p id="pid"></p>
<p id="pemail"></p>
<p id="pcontact"></p>
<p id="pdob"></p>
<p id="pcourse"></p>
<p id="pyear"></p>
<button onclick="logout()">Logout</button>
<button onclick="closeProfile()">Close</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";

let user=JSON.parse(localStorage.getItem("user"));
if(!user) window.location="login.html";

// ADMIN MODE
if(user.role==2){
  adminTabs.style.display="block";
  openTab('dashboard');
  loadFullData();
}else{
  openTab('database');
}

// TAB SWITCH
function openTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

// 🔍 SEARCH
function search(id){
fetch(`${API}?action=scan&id=${id}&role=${user.role}&userId=${user.id}&key=${KEY}`)
.then(r=>r.json())
.then(res=>{
if(res.status!=="success"){alert("Error");return;}

let s=res.data;
result.style.display="block";

uid.innerText=s.Unique_ID;
sci.innerText=s.Scientific_Name;
com.innerText=s.Common_Name;

img.src="https://drive.google.com/thumbnail?id="+s.Image.split("/d/")[1].split("/")[0];
pdf.src="https://drive.google.com/file/d/"+s.Pdf.split("/d/")[1].split("/")[0]+"/preview";

tree.innerHTML=`Phylum: ${s.Phylum} → Class: ${s.Class}`;
});
}

// 📷 SCANNER
function startScanner(){
let sc=new Html5Qrcode("reader");
sc.start({facingMode:"environment"},{fps:10},txt=>{
sc.stop();
search(txt);
});
}

function manualSearch(){ search(manual.value); }

// 📊 FULL ADMIN DATA
function loadFullData(){
fetch(`${API}?action=fullData&key=${KEY}`)
.then(r=>r.json())
.then(res=>{

let users=res.users;
let specimens=res.specimens;
let logs=res.logs;

// STATS
u.innerText=users.length-1;
s.innerText=specimens.length-1;
l.innerText=logs.length-1;

// TABLES
renderTable(userTable,users);
renderTable(specimenTable,specimens);
renderTable(logTable,logs);

// CHART
new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:["Users","Specimens","Scans"],
datasets:[{
data:[users.length-1,specimens.length-1,logs.length-1],
backgroundColor:["#3498db","#2ecc71","#e74c3c"]
}]
}
});

});
}

// TABLE RENDER
function renderTable(el,data){
let html="<tr>";
data[0].forEach(h=>html+=`<th>${h}</th>`);
html+="</tr>";

for(let i=1;i<data.length;i++){
html+="<tr>";
data[i].forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
}

el.innerHTML=html;
}

// PROFILE
function showProfile(){
profile.style.display="block";
pname.innerText="Name: "+user.name;
pid.innerText="ID: "+user.id;
pemail.innerText="Email: "+user.email;
pcontact.innerText="Contact: "+(user.contact||"");
pdob.innerText="DOB: "+(user.dob||"");
pcourse.innerText="Course: "+(user.course||"");
pyear.innerText="Year: "+(user.year||"");
}

function closeProfile(){ profile.style.display="none"; }

// LOGOUT
function logout(){
localStorage.clear();
window.location="login.html";
}

</script>

</body>
</html>
