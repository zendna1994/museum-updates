<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEN DNA - MUSEUM DATABASE</title>

<style>
:root{
  --primary:#1e3a8a;
  --accent:#3b82f6;
  --success:#059669;
  --glass: rgba(255, 255, 255, 0.96);
}

/* BASE STYLE & SECURITY */
body{
  margin:0; font-family:'Segoe UI', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg');
  background-size:cover; background-attachment: fixed;
  user-select: none; -webkit-user-select: none;
}

/* HEADER */
.header{
  display:flex; justify-content:space-between; align-items:center;
  padding:15px 20px; color:#fff; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
}
.title h1{margin:0; font-size:18px; letter-spacing: 1px;}
.nav-btns button {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 8px;
}

/* MAIN CONTAINER */
.container{
  background: var(--glass); margin:15px; border-radius:20px; padding:20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

input{ width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
.btn-primary{ width:100%; padding:12px; border:none; border-radius:10px; background:var(--primary); color:#fff; font-weight: bold; cursor:pointer; }

/* SCANNER BOX */
#reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; border: 2px solid var(--primary); display:none; }

/* SPECIMEN DISPLAY */
.specimen-card { margin-top: 20px; animation: slideIn 0.5s ease-out; }
.full-img { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-bottom: 15px; max-height: 250px; object-fit: contain; background: #f8fafc; }

.section-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 15px; border-left: 3px solid var(--primary); padding-left: 8px; }
.scientific { font-style: italic; font-size: 22px; color: #1e293b; margin: 5px 0; }
.common { font-weight: 600; color: #475569; margin-bottom: 15px; }

/* TREE UI */
.tree { margin-top: 10px; font-family: 'Courier New', monospace; font-size: 14px; background: #f1f5f9; padding: 15px; border-radius: 10px; line-height: 1.5; }

/* PDF VIEWER (A4 Style) */
.pdf-viewer { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 10px; margin-top: 15px; }

/* ALERT */
#statusAlert {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: white; padding: 10px 25px; border-radius: 30px;
  font-weight: bold; display: none; z-index: 10000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* PROFILE MODAL */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index: 9999; padding: 20px; }
.id-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; position: relative; color: #333; }
.id-card h2 { margin: 0; color: var(--primary); font-size: 20px; }
.detail-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid #eee; }
.qr-box { text-align: center; margin: 15px 0; }

@keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

<body oncontextmenu="return false" onkeydown="return (event.ctrlKey && ['s','u','i','j'].includes(event.key.toLowerCase())) ? false : true">

<div id="statusAlert">✅ SPECIMEN FOUND</div>

<div class="header">
  <div class="title">
    <h1>MUSEUM DATABASE</h1>
    <p>ZEN DNA | LOYOLA ZOOLOGY</p>
  </div>
  <div class="nav-btns">
    <button onclick="openProfile()">PROFILE</button>
    <button onclick="logout()">LOGOUT</button>
  </div>
</div>

<div class="container">
  <input id="scanId" placeholder="Enter Specimen ID...">
  <button class="btn-primary" onclick="scan()">SEARCH</button>
  
  <div id="reader"></div>
  <button id="camBtn" onclick="toggleScanner()" style="background:var(--accent); margin-top:10px;" class="btn-primary">TAP TO SCAN QR</button>

  <div id="result"></div>

  <h4 style="margin:25px 0 10px; font-size:14px;">SCAN HISTORY</h4>
  <input placeholder="Filter history..." oninput="filterHistory(this.value)">
  <div style="max-height: 150px; overflow: auto; border: 1px solid #eee; border-radius:10px;">
    <table style="width:100%; font-size:12px; border-collapse: collapse;">
      <tbody id="historyTable"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="id-card">
    <div style="font-size:10px; font-weight:bold; color:var(--primary);">DIGITAL IDENTITY CARD</div>
    <h2 id="p_name">USER NAME</h2>
    <div id="p_role" style="font-size:12px; font-weight:bold; margin-bottom:15px; color:var(--accent);">ROLE</div>
    
    <div id="p_details"></div>
    
    <div class="qr-box" id="p_qr"></div>
    <div id="p_id" style="text-align:center; font-family:monospace; font-weight:bold;">ID: ---</div>
    
    <button onclick="closeProfile()" style="margin-top:15px; background:#444;" class="btn-primary">CLOSE</button>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";

const user=JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login.html";

let html5QrCode;

function toggleScanner() {
  const reader = document.getElementById("reader");
  const btn = document.getElementById("camBtn");
  if(reader.style.display === "none") {
    reader.style.display = "block";
    btn.innerText = "CLOSE CAMERA";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, msg => {
      document.getElementById("scanId").value = msg;
      scan();
      toggleScanner();
    });
  } else {
    if(html5QrCode) html5QrCode.stop().then(() => {
        reader.style.display = "none";
        btn.innerText = "TAP TO SCAN QR";
    });
  }
}

function scan() {
  const id=document.getElementById("scanId").value.trim();
  if(!id) return;
  
  fetch(`${API}?action=scan&id=${id}&userId=${user.id}&userLevel=${user.role}&key=${KEY}`)
  .then(r=>r.json())
  .then(res=>{
    if(res.status === "success") {
      showAlert();
      const d = res.data;
      // Image Fix: Unified extraction
      const imgId = d.Image?.match(/[-\w]{25,}/);
      const imgSrc = imgId ? `https://drive.google.com/uc?export=view&id=${imgId[0]}` : "https://via.placeholder.com/400x300?text=No+Image+Available";

      document.getElementById("result").innerHTML = `
        <div class="specimen-card">
          <img src="${imgSrc}" class="full-img" onerror="this.src='https://via.placeholder.com/400?text=Image+Access+Restricted'">
          
          <div class="section-label">Nomenclature</div>
          <h2 class="scientific">${d.Scientific_Name}</h2>
          <div class="common">${d.Common_Name} (ID: ${id})</div>

          <div class="section-label">Classification</div>
          <div class="tree">
            Animalia<br>
            └── 🧬 ${d.Phylum}<br>
            &nbsp;&nbsp;&nbsp;&nbsp;└── 🐾 ${d.Class}
          </div>

          <div class="section-label">Digital Notes</div>
          <p style="font-size:12px; color:#555;">Record verified. Accessing full documentation...</p>

          ${d.Pdf ? `<iframe src="https://drive.google.com/file/d/${d.Pdf.match(/[-\w]{25,}/)[0]}/preview" class="pdf-viewer"></iframe>` : ''}
        </div>
      `;
      loadHistory();
    } else {
      alert("Specimen not found or Restricted.");
    }
  });
}

function showAlert() {
  const a = document.getElementById("statusAlert");
  a.style.display = "block";
  setTimeout(() => a.style.display = "none", 5000);
}

function loadHistory() {
  fetch(`${API}?action=history&userId=${user.id}&key=${KEY}`).then(r=>r.json()).then(res=>{
    let html="";
    res.data.reverse().forEach(d => html += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px;">${d.date}</td><td style="padding:8px; font-weight:bold;">${d.id}</td></tr>`);
    document.getElementById("historyTable").innerHTML = html;
  });
}

function filterHistory(v) {
  v=v.toLowerCase();
  document.querySelectorAll("#historyTable tr").forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none");
}

function openProfile() {
  document.getElementById("p_name").innerText = user.name.toUpperCase();
  document.getElementById("p_role").innerText = user.roleName || "MEMBER";
  document.getElementById("p_id").innerText = `UID: ${user.id}`;
  
  // Dynamic details based on sheet columns
  let detailHtml = "";
  const skip = ['status', 'role', 'name', 'id', 'roleName'];
  Object.entries(user).forEach(([k, v]) => {
    if(!skip.includes(k) && v) {
      detailHtml += `<div class="detail-row"><span style="color:#888; text-transform:capitalize;">${k.replace(/_/g,' ')}</span><span>${v}</span></div>`;
    }
  });
  document.getElementById("p_details").innerHTML = detailHtml;
  
  const qrBox = document.getElementById("p_qr");
  qrBox.innerHTML = "";
  new QRCode(qrBox, { text: user.id, width: 120, height: 120 });
  
  document.getElementById("profileModal").style.display = "flex";
}

function closeProfile() { document.getElementById("profileModal").style.display = "none"; }
function logout() { localStorage.clear(); location.href="login.html"; }

loadHistory();
</script>
</body>
</html>
