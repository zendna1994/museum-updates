<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; background:#eef2f3; text-align:center; }

.container {
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:auto;
}

#result { display:none; margin-top:20px; }

/* Styling for your new History Box */
#historyBox { 
  margin-top:20px; 
  border-top: 1px solid #ddd; 
  padding-top: 10px; 
  text-align: left;
}
#historyList { padding-left: 20px; color: #555; }

img { width:100%; border-radius:10px; }

button, input {
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h3>ZEN DNA Scanner</h3>

<button onclick="startScanner()">Scan QR</button>
<div id="reader"></div>

<input id="manual" placeholder="Enter ID">
<button onclick="manualSearch()">Search</button>

<button onclick="showProfile()">👤 Profile</button>

<div id="result">
  <img id="img">
  <h3 id="sci"></h3>
  <p id="com"></p>

  <p><b>ID:</b> <span id="uid"></span></p>
  <p><b>Phylum:</b> <span id="phy"></span></p>
  <p><b>Class:</b> <span id="cls"></span></p>

  <iframe id="pdf" width="100%" height="300"></iframe>

  <div id="historyBox">
    <h4>Recent Scans</h4>
    <ul id="historyList"></ul>
  </div>
</div>

</div>

<div id="profile" style="display:none; position:fixed; top:20%; left:10%; width:80%; background:white; padding:20px; border-radius:10px; z-index:1000; border: 1px solid #ccc;">
  <h3>User Profile</h3>
  <p id="pname"></p>
  <p id="pid"></p>
  <p id="prole"></p>
  <p id="pemail"></p>

  <button onclick="logout()">Logout</button>
  <button onclick="closeProfile()">Close</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY = "ZEN_DNA_2026";

// 🔐 LOGIN CHECK
let user = JSON.parse(localStorage.getItem("user"));
if (!user) {
  alert("Login required");
  window.location = "index.html";
}

// 📍 LOCATION CHECK
navigator.geolocation.getCurrentPosition(pos => {
  let d = distance(pos.coords.latitude, pos.coords.longitude, 13.0632, 80.234);
  if (d > 0.5) {
    alert("Outside allowed area");
    logout();
  }
});

function distance(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2-lat1)*Math.PI/180;
  let dLon = (lon2-lon1)*Math.PI/180;
  let a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 🔍 SEARCH
function search(id) {
  fetch(`${API}?action=scan&id=${id}&role=${user.role}&userId=${user.id}&key=${KEY}`)
  .then(res => res.json())
  .then(res => {
    if (res.status === "restricted") { alert("Access Denied"); return; }
    if (res.status !== "success") { alert("Not Found"); return; }

    let s = res.data;
    document.getElementById("result").style.display = "block";

    document.getElementById("uid").innerText = s.Unique_ID;
    document.getElementById("sci").innerText = s.Scientific_Name;
    document.getElementById("com").innerText = s.Common_Name;
    document.getElementById("phy").innerText = s.Phylum;
    document.getElementById("cls").innerText = s.Class;

    document.getElementById("img").src = formatImg(s.Image);
    document.getElementById("pdf").src = formatPdf(s.Pdf);

    saveHistory(s.Unique_ID);
    updateHistoryUI(); // Refresh the list visual
  });
}

function startScanner() {
  let scanner = new Html5Qrcode("reader");
  scanner.start({ facingMode: "environment" }, { fps:10 }, txt => {
    scanner.stop();
    search(txt);
  });
}

function manualSearch() {
  search(document.getElementById("manual").value);
}

function formatPdf(url) {
  let id = url.split("/d/")[1].split("/")[0];
  return "https://drive.google.com/file/d/"+id+"/preview";
}

function formatImg(url) {
  let id = url.split("/d/")[1].split("/")[0];
  return "https://drive.google.com/thumbnail?id="+id;
}

function showProfile() {
  document.getElementById("profile").style.display = "block";
  document.getElementById("pname").innerText = user.name;
  document.getElementById("pid").innerText = user.id;
  document.getElementById("prole").innerText = user.role;
  document.getElementById("pemail").innerText = user.email;
}

function closeProfile() {
  document.getElementById("profile").style.display = "none";
}

function logout() {
  localStorage.clear();
  window.location = "index.html";
}

// 📜 HISTORY LOGIC
function saveHistory(id) {
  let h = JSON.parse(localStorage.getItem("history")) || [];
  // Avoid duplicates
  if(!h.includes(id)) {
    h.unshift(id);
    h = h.slice(0,5);
    localStorage.setItem("history", JSON.stringify(h));
  }
}

function updateHistoryUI() {
  let h = JSON.parse(localStorage.getItem("history")) || [];
  let list = document.getElementById("historyList");
  list.innerHTML = h.map(item => `<li>${item}</li>`).join("");
}

// Load history on start
updateHistoryUI();

</script>

</body>
</html>
