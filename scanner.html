<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN DNA Scanner</title>

<!-- ✅ QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- ✅ PapaParse (IMPORTANT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --zen-green: #27ae60;
  --zen-dark: #1a2a22;
  --zen-light: #f8fdfa;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #eef2f3;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 480px;
  background: white;
  padding: 25px;
  border-radius: 25px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 1.2rem;
  margin: 0;
}

#reader {
  width: 100%;
  margin-top: 10px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: var(--zen-green);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

#resultCard {
  display: none;
  margin-top: 20px;
}

.specimen-img {
  width: 100%;
  border-radius: 10px;
}

.sci-name {
  font-style: italic;
  font-size: 1.3rem;
}

.com-name {
  color: gray;
  margin-bottom: 10px;
}

.info {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>ZEN DNA Scanner</h1>
  </div>

  <!-- Scan Button -->
  <button class="btn" onclick="startScanner()">SCAN QR</button>

  <!-- QR Reader -->
  <div id="reader"></div>

  <!-- Manual Entry -->
  <input type="text" id="manualId" placeholder="Enter ID manually">
  <button class="btn" onclick="manualSearch()">Search</button>

  <!-- Result -->
  <div id="resultCard">
    <img id="resImg" class="specimen-img">
    <h2 id="resSci" class="sci-name"></h2>
    <div id="resCom" class="com-name"></div>

    <div class="info"><b>ID:</b> <span id="resId"></span></div>
    <div class="info"><b>Phylum:</b> <span id="resPhy"></span></div>
    <div class="info"><b>Class:</b> <span id="resCla"></span></div>
    <div class="info"><b>Sex:</b> <span id="resSex"></span></div>
    <div class="info"><b>Preparation:</b> <span id="resPrep"></span></div>
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRTzNxCuuF8I0h64nf5YHfMANlBx08JfjHuSF4TUguLaamNPihaL9s-FaUcIwphKt5ilUMyLr525a8/pub?gid=357903049&single=true&output=csv";

let museumData = [];

// 🔐 LOGIN CHECK
let user = null;
try {
  user = JSON.parse(localStorage.getItem("user"));
} catch {}

if (!user) {
  alert("Login required");
  window.location.href = "login.html";
}

// 📥 LOAD DATA
Papa.parse(CSV_URL, {
  download: true,
  header: true,
  complete: function(results) {
    museumData = results.data;
    console.log("Loaded:", museumData.length);
  }
});

// 🔗 FIX IMAGE
function formatDriveLink(url) {
  if (!url) return "";
  if (!url.includes("drive.google.com")) return url;

  try {
    let id = "";
    if (url.includes("/file/d/")) {
      id = url.split("/file/d/")[1].split("/")[0];
    } else if (url.includes("id=")) {
      id = url.split("id=")[1].split("&")[0];
    }
    return `https://drive.google.com/thumbnail?sz=w1000&id=${id}`;
  } catch {
    return url;
  }
}

// 🔍 SEARCH FUNCTION
function searchSpecimen(id) {
  if (!id) return;

  const specimen = museumData.find(row =>
    String(row.Unique_ID).trim().toUpperCase() === id.trim().toUpperCase()
  );

  if (!specimen) {
    alert("ID Not Found");
    return;
  }

  document.getElementById("resultCard").style.display = "block";

  document.getElementById("resId").innerText = specimen.Unique_ID || "";
  document.getElementById("resSci").innerText = specimen.Scientific_Name || "";
  document.getElementById("resCom").innerText = specimen.Common_Name || "";
  document.getElementById("resPhy").innerText = specimen.Phylum || "";
  document.getElementById("resCla").innerText = specimen.Class || "";
  document.getElementById("resSex").innerText = specimen.Sex || "";
  document.getElementById("resPrep").innerText = specimen.Preparation || "";

  document.getElementById("resImg").src = formatDriveLink(specimen.Image);
}

// 📷 QR SCANNER
let scanner;

function startScanner() {
  try {
    scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        scanner.stop();
        searchSpecimen(decodedText);
      }
    );
  } catch (err) {
    alert("Camera error");
    console.error(err);
  }
}

// ⌨️ MANUAL SEARCH
function manualSearch() {
  const id = document.getElementById("manualId").value;
  searchSpecimen(id);
}
</script>

</body>
</html>
