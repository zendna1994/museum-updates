<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZEN DNA - MUSEUM DATABASE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap');

:root{
  --primary: #1e3a8a;
  --accent: #3b82f6;
  --glass: rgba(255, 255, 255, 0.98);
}

/* BASE STYLE & SECURITY */
body{
  margin:0; font-family: 'Inter', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
  url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg');
  background-size:cover; background-attachment: fixed;
  user-select: none;
}

/* HEADER - FIXED MOBILE ALIGNMENT */
.header{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 15px; color:#fff; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
}
.title h1{ margin:0; font-size:15px; letter-spacing: 1px; font-weight: 800; }
.nav-btns { display: flex; gap: 5px; }
.nav-btns button {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer;
}

/* MAIN CONTAINER */
.container{
  background: var(--glass); margin:12px; border-radius:20px; padding:20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

input{ 
  width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; 
  margin-bottom: 10px; box-sizing: border-box; font-size: 14px;
}
.btn-primary{ 
  width:100%; padding:12px; border:none; border-radius:10px; 
  background:var(--primary); color:#fff; font-weight: 700; cursor:pointer;
}

/* SCANNER BOX */
#reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; border: 2px solid var(--primary); display:none; }

/* LOADING ANIMATION */
#loader {
  display: none; margin: 20px auto; width: 30px; height: 30px;
  border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
  border-radius: 50%; animation: spin 1s linear infinite;
}

/* SPECIMEN DISPLAY */
.specimen-card { margin-top: 20px; animation: slideIn 0.5s ease-out; }
.full-img { width: 100%; border-radius: 12px; margin-bottom: 15px; max-height: 280px; object-fit: contain; background: #fff; border: 1px solid #eee; }

.section-label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-top: 15px; }
.scientific { font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; color: #0f172a; margin: 2px 0; }
.common { font-weight: 500; color: #64748b; font-size: 14px; margin-bottom: 15px; }

/* CLASSIFICATION TITLES */
.tree { margin-top: 10px; font-family: monospace; font-size: 13px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #f1f5f9; }
.tree b { color: var(--primary); font-size: 11px; text-transform: uppercase; }

/* PDF */
.pdf-viewer { width: 100%; height: 500px; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 15px; }

/* HISTORY TABLE - ONE LINE FIX */
.history-box { max-height: 200px; overflow: auto; border-radius: 10px; border: 1px solid #eee; margin-top: 10px; }
table { width: 100%; font-size: 11px; border-collapse: collapse; white-space: nowrap; }
td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }

/* PROFILE MODAL */
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index: 9999; }
.id-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: left; }
.qr-box { display: flex; justify-content: center; margin: 15px 0; }

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes slideIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

<body oncontextmenu="return false">

<div class="header">
  <div class="title">
    <h1>ZEN DNA</h1>
    <p>LOYOLA ZOOLOGY MUSEUM</p>
  </div>
  <div class="nav-btns">
    <button onclick="openProfile()">PROFILE</button>
    <button onclick="logout()">LOGOUT</button>
  </div>
</div>

<div class="container">
  <input id="scanId" placeholder="Enter Specimen ID...">
  <button class="btn-primary" onclick="scan()">SEARCH DATABASE</button>
  
  <div id="reader"></div>
  <button id="camBtn" onclick="toggleScanner()" style="background:var(--accent); margin-top:10px;" class="btn-primary">TAP TO SCAN QR</button>

  <div id="loader"></div>
  <div id="result"></div>

  <h4 style="margin:25px 0 10px; font-size:12px; font-weight:800; color:#94a3b8; text-transform:uppercase;">Scan History</h4>
  <input id="histSearch" placeholder="Search in history..." oninput="filterHistory(this.value)">
  <div class="history-box">
    <table>
      <tbody id="historyTable"></tbody>
    </table>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="id-card">
    <h2 id="p_name" style="margin:0; color:var(--primary);">USER NAME</h2>
    <div id="p_role" style="font-size:12px; font-weight:700; color:#64748b; margin-bottom:15px;">ROLE</div>
    <div id="p_details"></div>
    <div class="qr-box" id="p_qr"></div>
    <div id="p_id" style="text-align:center; font-family:monospace; font-weight:800; color:var(--primary);">UID: ---</div>
    <button onclick="closeProfile()" style="margin-top:20px; background:#334155;" class="btn-primary">CLOSE</button>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";
const user=JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login.html";

let html5QrCode;

function toggleScanner() {
  const reader = document.getElementById("reader");
  const btn = document.getElementById("camBtn");
  if(reader.style.display === "none") {
    reader.style.display = "block";
    btn.innerText = "CLOSE CAMERA";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({facingMode:"environment"}, {fps:15, qrbox:220}, msg => {
      document.getElementById("scanId").value = msg;
      scan();
      toggleScanner();
    });
  } else {
    if(html5QrCode) html5QrCode.stop().then(() => { reader.style.display = "none"; btn.innerText = "TAP TO SCAN QR"; });
  }
}

function scan() {
  const id=document.getElementById("scanId").value.trim();
  const loader=document.getElementById("loader");
  const resultDiv=document.getElementById("result");
  if(!id) return;
  
  loader.style.display="block";
  resultDiv.innerHTML="";

  fetch(`${API}?action=scan&id=${id}&userId=${user.id}&userLevel=${user.role}&key=${KEY}`)
  .then(r=>r.json())
  .then(res=>{
    loader.style.display="none";
    if(res.status === "success") {
      const d = res.data;
      // IMAGE FIX: Handles "file/d/ID/view" and converts to direct "uc?id=ID"
      const imgMatch = d.Image?.match(/[-\w]{25,}/);
      const imgSrc = imgMatch ? `https://drive.google.com/uc?export=view&id=${imgMatch[0]}` : "";

      resultDiv.innerHTML = `
        <div class="specimen-card">
          ${imgSrc ? `<img src="${imgSrc}" class="full-img">` : ''}
          <div class="section-label">Nomenclature</div>
          <h2 class="scientific">${d.Scientific_Name}</h2>
          <div class="common">${d.Common_Name} | ID: ${id}</div>

          <div class="section-label">Classification</div>
          <div class="tree">
            <b>Kingdom:</b> Animalia<br>
            <b>Phylum:</b> ${d.Phylum}<br>
            <b>Class:</b> ${d.Class}
          </div>

          <div class="section-label">Documentation</div>
          ${d.Pdf ? `<iframe src="https://drive.google.com/file/d/${d.Pdf.match(/[-\w]{25,}/)[0]}/preview" class="pdf-viewer"></iframe>` : ''}
        </div>
      `;
      loadHistory();
    } else if (res.status === "restricted") {
      resultDiv.innerHTML = "<p style='color:red; text-align:center;'>⛔ ACCESS RESTRICTED</p>";
    } else {
      resultDiv.innerHTML = "<p style='text-align:center;'>🔍 NO SPECIMEN FOUND</p>";
    }
  });
}

function loadHistory() {
  fetch(`${API}?action=history&userId=${user.id}&key=${KEY}`).then(r=>r.json()).then(res=>{
    let html="";
    res.data.reverse().forEach(d => html += `<tr><td style="color:#64748b;">${d.date}</td><td style="font-weight:700; color:var(--primary); text-align:right;">${d.id}</td></tr>`);
    document.getElementById("historyTable").innerHTML = html;
  });
}

function filterHistory(v) {
  v=v.toLowerCase();
  document.querySelectorAll("#historyTable tr").forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? "" : "none");
}

function openProfile() {
  document.getElementById("p_name").innerText = user.name.toUpperCase();
  document.getElementById("p_role").innerText = user.roleName || "MEMBER";
  document.getElementById("p_id").innerText = `UID: ${user.id}`;
  let detailHtml = "";
  Object.entries(user).forEach(([k, v]) => {
    if(!['status','role','name','id','roleName'].includes(k) && v) {
      detailHtml += `<div style="display:flex; justify-content:space-between; font-size:11px; padding:5px 0; border-bottom:1px solid #f1f5f9;"><span style="color:#94a3b8; text-transform:uppercase;">${k.replace(/_/g,' ')}</span><b>${v}</b></div>`;
    }
  });
  document.getElementById("p_details").innerHTML = detailHtml;
  const qrBox = document.getElementById("p_qr");
  qrBox.innerHTML = "";
  new QRCode(qrBox, { text: user.id, width: 120, height: 120 });
  document.getElementById("profileModal").style.display = "flex";
}

function closeProfile() { document.getElementById("profileModal").style.display = "none"; }
function logout() { localStorage.clear(); location.href="login.html"; }
loadHistory();
</script>
</body>
</html>
