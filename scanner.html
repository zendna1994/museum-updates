<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZEN Scanner</title>

  <!-- QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f2f2f2;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 80%;
    }

    #result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      max-width: 300px;
    }
  </style>
</head>

<body>

<h2>ZEN Scanner</h2>

<button onclick="startScanner()">Start Scan</button>

<div id="reader"></div>

<br>

<input type="text" id="manualId" placeholder="Enter ID manually">
<br>
<button onclick="manualSearch()">Search</button>

<div id="result" style="display:none;">
  <img id="img">
  <h3 id="name"></h3>
  <p id="common"></p>
  <p><b>ID:</b> <span id="id"></span></p>
  <p><b>Phylum:</b> <span id="phy"></span></p>
  <p><b>Class:</b> <span id="cls"></span></p>
  <a id="pdf" target="_blank">Open PDF</a>
</div>

<script>

// 🔴 PUT YOUR API LINK HERE
const API_URL = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";

// SEARCH FUNCTION
function search(id) {
  if (!id) return;

  fetch(API_URL + "?id=" + id)
    .then(res => res.json())
    .then(data => {

      if (data.status !== "success") {
        alert("Invalid ID");
        return;
      }

      const s = data.data;

      document.getElementById("result").style.display = "block";

      document.getElementById("id").innerText = s.Unique_ID;
      document.getElementById("name").innerText = s.Scientific_Name;
      document.getElementById("common").innerText = s.Common_Name;
      document.getElementById("phy").innerText = s.Phylum;
      document.getElementById("cls").innerText = s.Class;

      document.getElementById("img").src = formatImage(s.Image);
      document.getElementById("pdf").href = s.Pdf || "#";
    })
    .catch(() => {
      alert("Server Error");
    });
}

// MANUAL SEARCH
function manualSearch() {
  const id = document.getElementById("manualId").value;
  search(id);
}

// QR SCANNER
let scanner;

function startScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      scanner.stop();
      search(text);
    }
  );
}

// GOOGLE DRIVE IMAGE FIX
function formatImage(url) {
  if (!url) return "";
  try {
    let id = url.split("/d/")[1].split("/")[0];
    return "https://drive.google.com/thumbnail?id=" + id;
  } catch {
    return url;
  }
}

</script>

</body>
</html>
