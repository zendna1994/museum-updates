<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN DNA System</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#eef2f3; margin:0; }

/* LOADER */
#loader {
  display:none;
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(255,255,255,0.7);
  z-index:9999;
}
#loader div {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
}

/* CONTAINER */
.container { max-width:900px; margin:auto; padding:15px; }

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:white;
  cursor:pointer;
}

.tab { display:none; }
.active { display:block; }

table { width:100%; border-collapse:collapse; }
td,th { border:1px solid #ddd; padding:8px; font-size:12px; }

/* PROFILE POPUP */
#profile {
  display:none;
  position:fixed;
  top:10%;
  left:5%;
  right:5%;
  background:white;
  padding:20px;
  border-radius:15px;
  z-index:2000;
  box-shadow:0 0 30px rgba(0,0,0,0.3);
}

/* IMAGE */
#img {
  width:100%;
  border-radius:10px;
}

/* ADMIN MINI TABLE */
.mini {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
</style>
</head>

<body>

<div id="loader"><div>Loading...</div></div>

<div class="container">

<h2>ZEN DNA SYSTEM</h2>

<button onclick="showProfile()">👤 Profile</button>

<div id="adminTabs" style="display:none;">
  <button onclick="openTab('dashboard')">📊 Dashboard</button>
  <button onclick="openTab('database')">🧬 Database</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">

<div class="card">
<h3>Statistics</h3>
<div class="mini">
<p>Users: <b id="u"></b></p>
<p>Specimens: <b id="s"></b></p>
<p>Scans: <b id="l"></b></p>
<p>Top Scan: <b id="topScan"></b></p>
</div>

<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Users</h3>
<input placeholder="Search User" onkeyup="filterTable(this,userTable)">
<table id="userTable"></table>
</div>

<div class="card">
<h3>Specimens</h3>
<table id="specimenTable"></table>
</div>

<div class="card">
<h3>Scan Logs</h3>
<table id="logTable"></table>
</div>

</div>

<!-- DATABASE -->
<div id="database" class="tab">

<div class="card">

<button onclick="startScanner()">📷 Scan</button>
<div id="reader"></div>

<input id="manual" placeholder="Enter ID">
<button onclick="manualSearch()">Search</button>

<div id="result" style="display:none;">
<img id="img">
<h3 id="sci"></h3>
<p id="com"></p>
<p id="uid"></p>

<div id="tree"></div>

<iframe id="pdf" width="100%" height="300"></iframe>
</div>

</div>

</div>

</div>

<!-- PROFILE -->
<div id="profile">
<h3>👤 User Profile</h3>
<p id="pname"></p>
<p id="pid"></p>
<p id="pemail"></p>
<p id="pcontact"></p>
<p id="pdob"></p>
<p id="pcourse"></p>
<p id="pyear"></p>
<button onclick="logout()" style="background:red;">Logout</button>
<button onclick="closeProfile()">Close</button>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";

let user=JSON.parse(localStorage.getItem("user"));
if(!user) window.location="login.html";

/* ADMIN */
if(user.role==2){
  adminTabs.style.display="block";
  openTab('dashboard');
  loadFullData();
}else{
  openTab('database');
}

/* LOADER */
function showLoader(){ loader.style.display="block"; }
function hideLoader(){ loader.style.display="none"; }

/* TAB */
function openTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* SEARCH */
function search(id){
showLoader();

fetch(`${API}?action=scan&id=${id}&role=${user.role}&userId=${user.id}&key=${KEY}`)
.then(r=>r.json())
.then(res=>{
hideLoader();

if(res.status!=="success"){
alert(res.status==="restricted"?"Access Denied":"Not Found");
return;
}

let s=res.data;
result.style.display="block";

uid.innerText=s.Unique_ID;
sci.innerText=s.Scientific_Name;
com.innerText=s.Common_Name;

/* WATERMARK PRO */
let fileId = s.Image.split("/d/")[1].split("/")[0];
let imgUrl = "https://drive.google.com/uc?export=view&id=" + fileId;

img.src = imgUrl;

img.onload = function(){
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.naturalWidth;
canvas.height=img.naturalHeight;

ctx.drawImage(img,0,0);

ctx.font="bold 30px Arial";
ctx.fillStyle="rgba(255,255,255,0.15)";
ctx.rotate(-Math.PI/6);

for(let i=-canvas.height;i<canvas.width;i+=300){
for(let j=-canvas.width;j<canvas.height;j+=200){
ctx.fillText("ZEN-DNA | LC",i,j);
}
}

ctx.rotate(Math.PI/6);
img.src=canvas.toDataURL();
};

/* PDF SAFE VIEW */
pdf.src="https://drive.google.com/file/d/"+s.Pdf.split("/d/")[1].split("/")[0]+"/preview";

/* TREE */
tree.innerHTML=`Phylum: ${s.Phylum} → Class: ${s.Class}`;

});
}

/* SCANNER */
function startScanner(){
let sc=new Html5Qrcode("reader");
sc.start({facingMode:"environment"},{fps:10},txt=>{
sc.stop();
search(txt);
});
}

function manualSearch(){ search(manual.value); }

/* ADMIN DATA */
function loadFullData(){
showLoader();

fetch(`${API}?action=fullData&key=${KEY}`)
.then(r=>r.json())
.then(res=>{
hideLoader();

let users=res.users;
let specimens=res.specimens;
let logs=res.logs;

u.innerText=users.length-1;
s.innerText=specimens.length-1;
l.innerText=logs.length-1;

/* TOP SCAN */
let count={};
logs.slice(1).forEach(r=>{
count[r[2]]=(count[r[2]]||0)+1;
});
topScan.innerText=Object.keys(count).reduce((a,b)=>count[a]>count[b]?a:b,"-");

renderTable(userTable,users);
renderTable(specimenTable,specimens);
renderTable(logTable,logs);

new Chart(chart,{
type:'bar',
data:{
labels:["Users","Specimens","Scans"],
datasets:[{
data:[users.length-1,specimens.length-1,logs.length-1],
backgroundColor:["#3498db","#2ecc71","#e74c3c"]
}]
}
});

});
}

/* TABLE */
function renderTable(el,data){
let html="<tr>";
data[0].forEach(h=>html+=`<th>${h}</th>`);
html+="</tr>";

for(let i=1;i<data.length;i++){
html+="<tr>";
data[i].forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
}
el.innerHTML=html;
}

/* FILTER */
function filterTable(input,table){
let val=input.value.toLowerCase();
[...table.rows].forEach((r,i)=>{
if(i===0)return;
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
});
}

/* PROFILE */
function showProfile(){
profile.style.display="block";
pname.innerText="Name: "+user.name;
pid.innerText="ID: "+user.id;
pemail.innerText="Email: "+user.email;
pcontact.innerText="Contact: "+(user.contact||"-");
pdob.innerText="DOB: "+(user.dob||"-");
pcourse.innerText="Course: "+(user.course||"-");
pyear.innerText="Year: "+(user.year||"-");
}

function closeProfile(){ profile.style.display="none"; }

/* LOGOUT */
function logout(){
localStorage.clear();
window.location="login.html";
}

/* SECURITY */
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",e=>{
if(e.key==="F12"|| (e.ctrlKey && e.shiftKey && e.key==="I")){
e.preventDefault();
}
});

document.addEventListener("visibilitychange",()=>{
if(document.hidden){
document.body.style.filter="blur(10px)";
}else{
document.body.style.filter="none";
}
});

</script>

</body>
</html>
