<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSEUM DATABASE</title>

<style>
:root{
  --primary:#1e3a8a;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg');
  background-size:cover;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  color:#fff;
}

/* CARD */
.container{
  background:#fff;
  margin:10px;
  border-radius:15px;
  padding:15px;
}

/* HISTORY */
.history{
  max-height:200px;
  overflow:auto;
  margin-top:10px;
}

table{
  width:100%;
  font-size:12px;
}
td{
  padding:6px;
  border-bottom:1px solid #eee;
}

.scientific{font-style:italic;}
.common{font-weight:bold;}
</style>
</head>

<body>

<div class="header">
  <div>
    <h3>MUSEUM DATABASE</h3>
    <small>ZEN - DNA</small>
  </div>
  <div>
    👤 🔓
  </div>
</div>

<div class="container">

<input id="scanId" placeholder="Scan / Enter ID">
<button onclick="scan()">SCAN</button>

<div id="result"></div>

<h4>HISTORY</h4>
<input placeholder="Search..." oninput="filterHistory(this.value)">
<div class="history">
  <table id="historyTable"></table>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY="ZEN_DNA_2026";

const user=JSON.parse(localStorage.getItem("user"));
if(!user){ location.href="login.html"; }

/* 🔥 LOAD HISTORY (REAL FROM SHEET) */
function loadHistory(){
 fetch(`${API}?action=history&userId=${user.id}&key=${KEY}`)
 .then(r=>r.json())
 .then(res=>{
   let html="";

   res.data.forEach(d=>{
     html+=`
     <tr>
       <td>${d.date}</td>
       <td>${d.id}</td>
       <td class="scientific">${d.Scientific_Name}</td>
       <td class="common">${d.Common_Name}</td>
     </tr>
     `;
   });

   document.getElementById("historyTable").innerHTML=html;
 });
}
loadHistory();

/* SEARCH */
function filterHistory(val){
 val=val.toLowerCase();
 document.querySelectorAll("#historyTable tr").forEach(row=>{
   row.style.display=row.innerText.toLowerCase().includes(val)?"":"none";
 });
}
</script>

</body>
</html>
