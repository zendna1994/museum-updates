<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuSiA4ruPfHIm-dZVX_SBh5rk69JUkCmPdQX4ym1uJ6sjDSHSzwepK7coDEhITweiLuLJR8gbvcLwa/pub?output=csv';

let museumData = [];
const beep = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");

// 🔐 LOGIN CHECK
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
  alert("Login required");
  window.location.href = "login.html";
}

// 📥 LOAD DATA
Papa.parse(CSV_URL, {
  download: true,
  header: true,
  complete: (results) => {
    museumData = results.data;
    console.log("Data loaded:", museumData.length);
  }
});

// 🔗 FORMAT DRIVE IMAGE
function formatDriveLink(url) {
  if (!url || !url.includes("drive.google.com")) return url;
  let fileId = "";
  try {
    if (url.includes("/file/d/")) {
      fileId = url.split("/file/d/")[1].split("/")[0];
    } else if (url.includes("id=")) {
      fileId = url.split("id=")[1].split("&")[0];
    }
    return `https://drive.google.com/thumbnail?sz=w1000&id=${fileId}`;
  } catch {
    return url;
  }
}

// 🔍 SEARCH FUNCTION (USED BY BOTH QR + MANUAL)
function searchSpecimen(id) {
  if (!id) return;

  const specimen = museumData.find(row =>
    String(row.Unique_ID).trim().toUpperCase() === id.trim().toUpperCase()
  );

  if (specimen) {
    beep.play();

    document.getElementById('success-popup').style.display = 'block';
    setTimeout(() => {
      document.getElementById('success-popup').style.display = 'none';
    }, 2000);

    document.getElementById('resultCard').style.display = 'block';

    document.getElementById('resId').innerText = specimen.Unique_ID || "N/A";
    document.getElementById('resSci').innerText = specimen.Scientific_Name || "N/A";
    document.getElementById('resCom').innerText = specimen.Common_Name || "N/A";
    document.getElementById('resPhy').innerText = specimen.Phylum || "N/A";
    document.getElementById('resCla').innerText = specimen.Class || "N/A";
    document.getElementById('resSex').innerText = specimen.Sex || "N/A";
    document.getElementById('resPrep').innerText = specimen.Preparation || "N/A";

    document.getElementById('resImg').src = formatDriveLink(specimen.Image);
    document.getElementById('resPdf').href = specimen.Pdf || "#";

    const vBtn = document.getElementById('resVid');
    if (specimen.video && specimen.video.trim() !== "") {
      vBtn.href = specimen.video;
      vBtn.style.display = 'block';
    } else {
      vBtn.style.display = 'none';
    }

    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  } else {
    alert("ID Not Found");
  }
}

// 📷 QR SCANNER
const html5QrCode = new Html5Qrcode("reader");

function startScanner() {
  document.getElementById('start-btn').style.display = 'none';

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      html5QrCode.stop().then(() => {
        document.getElementById('start-btn').style.display = 'block';
        searchSpecimen(text);
      });
    }
  ).catch(() => {
    alert("Camera permission required");
    document.getElementById('start-btn').style.display = 'block';
  });
}

// ⌨️ MANUAL ENTRY BUTTON FIX
document.querySelector("button[onclick]").onclick = () => {
  const id = document.getElementById('manualId').value;
  searchSpecimen(id);
};
</script>
