<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEN DNA - Pro Scanner</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
            --success: #059669;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark) url('https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg/960px-Rev_Fr_Charles_Leigh_SJ_Zoology_Museum_Loyola_College_JEG_IMG_1218.jpg') center/cover fixed;
            color: #1e293b; overflow-x: hidden;
        }

        /* GLASS HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); color: white; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 10px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }
        .badge-admin { background: #dc2626; color: white; }
        .badge-student { background: var(--accent); color: white; }

        .main-container { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* SCANNER BOX */
        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 2px solid var(--accent); background: #000;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* PRO SPECIMEN CARD */
        .specimen-card {
            background: var(--glass); border-radius: 24px; padding: 20px;
            margin-top: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }

        .id-label { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 1px; }
        
        .specimen-header { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 20px; }
        .thumb-img { 
            width: 80px; height: 80px; border-radius: 12px; 
            object-fit: cover; border: 2px solid #ddd; 
        }

        .section-title {
            font-size: 11px; font-weight: 900; color: var(--primary);
            text-transform: uppercase; margin: 15px 0 8px;
            display: flex; align-items: center; gap: 8px;
        }

        .nomenclature h2 { margin: 0; font-style: italic; font-size: 20px; color: #1e293b; }
        .nomenclature p { margin: 0; color: #64748b; font-weight: 600; }

        /* CLASSIFICATION TREE */
        .tree-container { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
        .tree-line { color: #cbd5e1; margin-right: 5px; }

        /* LOADING SPINNER */
        .spinner {
            display: none; margin: 20px auto; width: 40px; height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-left-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* PROFILE CARD (Digital ID) */
        .digital-id {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            color: white; border-radius: 20px; padding: 20px; text-align: center;
        }
        .qr-card { background: white; padding: 10px; display: inline-block; border-radius: 10px; margin-top: 10px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* FOOTER HISTORY */
        .history-mini { background: rgba(255,255,255,0.1); border-radius: 15px; color: white; padding: 10px; margin-top: 20px; }
        .history-row { display: flex; justify-content: space-between; font-size: 11px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0; font-size:16px;">ZEN DNA PRO</h1>
        <div id="roleBadge" class="user-badge">Loading...</div>
    </div>
    <div style="display:flex; gap:15px;">
        <span onclick="openProfile()" style="cursor:pointer">🆔</span>
        <span onclick="logout()" style="cursor:pointer">🔓</span>
    </div>
</div>

<div class="main-container">
    <div id="reader"></div>
    <div id="scanLoader" class="spinner"></div>
    
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="startScanner()" style="flex:2; background:var(--accent); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">AUTO-SCAN ON</button>
        <button onclick="stopScanner()" style="flex:1; background:#444; color:white; border:none; border-radius:10px;">OFF</button>
    </div>

    <div id="result"></div>

    <div class="history-mini">
        <div style="font-weight:bold; margin-bottom:10px; font-size:12px;">RECENT SCANS</div>
        <div id="historyRows"></div>
    </div>
</div>

<div class="profile-popup" id="profilePopup" onclick="closeProfile()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
    <div class="digital-id" onclick="event.stopPropagation()">
        <div style="font-size:12px; opacity:0.8;">OFFICIAL DIGITAL ID</div>
        <h2 id="idName" style="margin:10px 0 5px;">User Name</h2>
        <div id="idRole" class="user-badge" style="display:inline-block">ROLE</div>
        <div class="qr-card" id="userQR"></div>
        <div id="idCode" style="margin-top:10px; font-family:monospace; font-weight:bold;">ID: ---</div>
        <button onclick="closeProfile()" style="margin-top:20px; background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 20px; border-radius:10px;">CLOSE</button>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";
const KEY = "ZEN_DNA_2026";

const user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href = "login.html";

// Initial UI Setup
document.getElementById("roleBadge").innerText = user.roleName || "User";
document.getElementById("roleBadge").className = `user-badge badge-${(user.roleName || "").toLowerCase()}`;

let html5QrCode;

function startScanner() {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            // AUTO SCAN TRIGGER
            fetchSpecimen(decodedText);
            // Optional: Vibrate on success
            if(window.navigator.vibrate) window.navigator.vibrate(100);
        }
    );
}

function stopScanner() {
    if(html5QrCode) html5QrCode.stop().then(() => document.getElementById("reader").innerHTML = "");
}

async function fetchSpecimen(id) {
    const loader = document.getElementById("scanLoader");
    const result = document.getElementById("result");
    
    loader.style.display = "block";
    
    try {
        const response = await fetch(`${API}?action=scan&id=${id}&userId=${user.id}&userLevel=${user.role}&key=${KEY}`);
        const res = await response.json();
        
        loader.style.display = "none";
        
        if(res.status === "restricted") {
            result.innerHTML = `<div class="specimen-card" style="border-left:5px solid #dc2626"><h3>⚠️ Restricted</h3><p>Higher access level required.</p></div>`;
            return;
        }

        const d = res.data;
        const imgId = d.Image?.match(/[-\w]{25,}/);
        const imgSrc = imgId ? `https://drive.google.com/uc?export=view&id=${imgId[0]}` : "";

        result.innerHTML = `
            <div class="specimen-card">
                <div class="id-label">UNIQUE ID: ${id}</div>
                <div class="specimen-header">
                    ${imgSrc ? `<img src="${imgSrc}" class="thumb-img">` : ''}
                    <div class="nomenclature">
                        <div class="section-title">Nomenclature</div>
                        <h2>${d.Scientific_Name}</h2>
                        <p>${d.Common_Name}</p>
                    </div>
                </div>

                <div class="section-title">🌍 Classification Hierarchy</div>
                <div class="tree-container">
                    <div>Animalia</div>
                    <div><span class="tree-line">└──</span>🧬 ${d.Phylum}</div>
                    <div><span class="tree-line">&nbsp;&nbsp;&nbsp;└──</span>🐾 ${d.Class}</div>
                </div>

                <div class="section-title">📄 Digital Notes</div>
                <div style="font-size:12px; color:#475569;">Specimen verified via ZEN-DNA protocol. Check PDF for morphological details.</div>
                
                ${d.Pdf ? `<iframe src="https://drive.google.com/file/d/${d.Pdf.match(/[-\w]{25,}/)[0]}/preview" style="width:100%; height:300px; border:none; margin-top:15px; border-radius:10px;"></iframe>` : ''}
            </div>
        `;
        loadHistory();
    } catch(e) {
        loader.style.display = "none";
        console.error(e);
    }
}

function loadHistory() {
    fetch(`${API}?action=history&userId=${user.id}&key=${KEY}`)
    .then(r => r.json())
    .then(res => {
        let html = "";
        res.data.slice(-5).reverse().forEach(d => {
            html += `
            <div class="history-row">
                <span>${d.date.split(' ')[0]}</span>
                <span style="font-weight:bold">${d.id}</span>
            </div>`;
        });
        document.getElementById("historyRows").innerHTML = html;
    });
}

function openProfile() {
    document.getElementById("idName").innerText = user.name.toUpperCase();
    document.getElementById("idRole").innerText = user.roleName;
    document.getElementById("idCode").innerText = `ID: ${user.id}`;
    
    const qrDiv = document.getElementById("userQR");
    qrDiv.innerHTML = "";
    new QRCode(qrDiv, { text: user.id, width: 128, height: 128 });
    
    document.getElementById("profilePopup").style.display = "flex";
}

function closeProfile() { document.getElementById("profilePopup").style.display = "none"; }
function logout() { localStorage.clear(); location.href="login.html"; }

loadHistory();
startScanner(); // Auto-start on load
</script>
</body>
</html>
