<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZEN Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background:#eef2f3;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container {
  background:white;
  padding:20px;
  border-radius:15px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo {
  width:80px;
}

.sub {
  font-size:12px;
  color:#555;
}

button, input {
  width:100%;
  padding:10px;
  margin-top:10px;
}

#reader { margin-top:10px; }

#result {
  margin-top:15px;
  display:none;
}

img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png" class="logo">

<h3>Loyola College, Chennai</h3>
<div class="sub">Advanced Zoology & Biotechnology</div>
<div class="sub">ZEN-DNA | Zoology E-Learning Network</div>

<button onclick="startScanner()">Scan QR</button>

<div id="reader"></div>

<input type="text" id="manual" placeholder="Enter ID manually">
<button onclick="manual()">Search</button>

<div id="result">
  <img id="img">
  <h3 id="sci"></h3>
  <p id="com"></p>

  <p><b>ID:</b> <span id="id"></span></p>
  <p><b>Phylum:</b> <span id="phy"></span></p>
  <p><b>Class:</b> <span id="cls"></span></p>

  <a id="pdf" target="_blank">Open PDF</a>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz_bifFkLBL2Wbv8snnRhRwqyt4AJGyqfvcoK3elir9sbMu5OSlpTk_KbDAVwxgem-V/exec";

// SEARCH
function search(id) {

  fetch(`${API}?action=scan&id=${id}`)
    .then(res => res.json())
    .then(res => {

      if (res.status !== "success") {
        alert("Invalid ID");
        return;
      }

      const s = res.data;

      document.getElementById("result").style.display = "block";

      document.getElementById("id").innerText = s.Unique_ID;
      document.getElementById("sci").innerText = s.Scientific_Name;
      document.getElementById("com").innerText = s.Common_Name;
      document.getElementById("phy").innerText = s.Phylum;
      document.getElementById("cls").innerText = s.Class;

      document.getElementById("img").src = formatImg(s.Image);
      document.getElementById("pdf").href = s.Pdf || "#";
    });
}

// MANUAL
function manual() {
  search(document.getElementById("manual").value);
}

// QR
let scanner;

function startScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    text => {
      scanner.stop();
      search(text);
    }
  );
}

// IMAGE FIX
function formatImg(url) {
  if (!url) return "";
  try {
    let id = url.split("/d/")[1].split("/")[0];
    return "https://drive.google.com/thumbnail?id=" + id;
  } catch {
    return url;
  }
}

</script>

</body>
</html>
